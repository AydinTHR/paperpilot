version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Batch updates into a few PRs instead of one per dependency.
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
