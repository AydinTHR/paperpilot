name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest --cov=src --cov=config --cov-report=term-missing

  # Stable required check. Branch protection requires "CI", which stays valid
  # regardless of how many versions the matrix runs.
  CI:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test job did not succeed"
            exit 1
          fi
          echo "all checks passed"
